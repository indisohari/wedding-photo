<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>동윤 & 지연 결혼식 사진 업로드</title>
    <style>
        /* 전 세대를 위한 크고 선명한 디자인 */
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background-color: #fcfcfc; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #ffffff; padding: 40px 30px; border-radius: 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); max-width: 400px; width: 100%; text-align: center; border: 1px solid #f0f0f0; }
        h1 { font-size: 1.6rem; color: #4a4a4a; margin-bottom: 10px; font-weight: 600; }
        p.subtitle { font-size: 1.1rem; color: #888; margin-bottom: 30px; }
        
        .input-group { margin-bottom: 25px; }
        label { display: block; font-size: 1.1rem; margin-bottom: 10px; color: #555; }
        input[type="text"] { width: 100%; padding: 15px; font-size: 1.2rem; border: 2px solid #ddd; border-radius: 8px; text-align: center; box-sizing: border-box; }
        
        /* 커스텀 파일 업로드 버튼 */
        .file-upload-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; margin-bottom: 20px; }
        .file-upload-wrapper input[type="file"] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; }
        .btn-file { background-color: #f1f3f5; color: #495057; border: 2px dashed #ced4da; padding: 20px; font-size: 1.1rem; border-radius: 8px; font-weight: bold; width: 100%; box-sizing: border-box; cursor: pointer; display: block; }
        
        .btn-submit { background-color: #5c7cfa; color: white; border: none; padding: 18px; font-size: 1.2rem; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; transition: background 0.3s; }
        .btn-submit:disabled { background-color: #adb5bd; cursor: not-allowed; }
        
        #upload-section, #kakao-guide { display: none; }
        
        /* iOS 카카오톡 차단 화면 */
        #kakao-guide { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); color: white; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; box-sizing: border-box; }
        #kakao-guide h2 { color: #ffd43b; font-size: 1.8rem; margin-bottom: 20px; }
        #kakao-guide p { font-size: 1.2rem; line-height: 1.6; }
        
        #status-msg { margin-top: 20px; font-size: 1.1rem; font-weight: bold; }
        .text-info { color: #339af0; } .text-success { color: #40c057; } .text-error { color: #fa5252; }
    </style>
</head>
<body>

    <div id="kakao-guide">
        <h2>⚠️ 화면 우측 하단을 확인해주세요</h2>
        <p>카카오톡 안에서는 사진 전송이 어렵습니다.<br><br>화면 아래의 <strong>[ ⋮ ]</strong> 기호를 누른 후,<br><strong>[다른 브라우저로 열기]</strong>를 선택해 주세요.</p>
    </div>

    <div class="card">
        <h1>동윤 & 지연 결혼식</h1>
        <p class="subtitle">2026. 05. 23</p>

        <!-- 1. 입장 코드 화면 -->
        <div id="auth-section">
            <div class="input-group">
                <label>예식일 4자리를 입력해주세요</label>
                <input type="text" id="passcode" placeholder="예: 0523" maxlength="4" inputmode="numeric">
            </div>
            <button class="btn-submit" id="btn-verify">입장하기</button>
            <div id="auth-error" class="text-error" style="margin-top: 15px; display: none;">비밀번호가 틀렸습니다.</div>
        </div>

        <!-- 2. 사진 업로드 화면 -->
        <div id="upload-section">
            <p style="font-size: 1.1rem; margin-bottom: 20px;">예쁘게 찍어주신 사진을 골라주세요.</p>
            
            <div class="file-upload-wrapper">
                <button class="btn-file" id="btn-file-text">📸 여기를 눌러 사진 선택하기</button>
                <input type="file" id="file-input" multiple accept="image/*,video/*,.heic,.heif">
            </div>
            
            <button class="btn-submit" id="btn-upload" disabled>전송하기</button>
            <div id="status-msg"></div>
            
            <div style="margin-top: 30px; font-size: 0.95rem; color: #868e96;">
                용량이 큰 동영상은 아래 링크를 이용해주세요.<br><br>
                <a id="dropbox-link" href="#" target="_blank" style="color: #5c7cfa; font-weight: bold; text-decoration: none;">고화질 동영상 보내기 ➔</a>
            </div>
        </div>
    </div>

    <script>
        // ▼▼▼ 여기에 발급받은 URL을 넣으세요 ▼▼▼
        const GOOGLE_SCRIPT_URL = '여기에_웹앱_URL을_붙여넣으세요'; 
        const DROPBOX_URL = '여기에_드롭박스_URL을_붙여넣으세요';
        // ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

        const WEDDING_CODE = '0523';
        document.getElementById('dropbox-link').href = DROPBOX_URL;

        // 1. 카카오톡 인앱 브라우저 강제 이탈 로직
        const ua = navigator.userAgent.toLowerCase();
        if (ua.indexOf('kakaotalk') > -1) {
            if (ua.indexOf('android') > -1) {
                location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(location.href);
            } else if (ua.indexOf('iphone') > -1 || ua.indexOf('ipad') > -1) {
                document.getElementById('kakao-guide').style.display = 'flex';
            }
        }

        // 2. 입장 확인
        document.getElementById('btn-verify').addEventListener('click', () => {
            if (document.getElementById('passcode').value === WEDDING_CODE) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('upload-section').style.display = 'block';
            } else {
                document.getElementById('auth-error').style.display = 'block';
            }
        });

        // 3. 파일 선택 시 화면 변화
        const fileInput = document.getElementById('file-input');
        const btnUpload = document.getElementById('btn-upload');
        fileInput.addEventListener('change', () => {
            if(fileInput.files.length > 0) {
                document.getElementById('btn-file-text').innerText = `✅ ${fileInput.files.length}장의 사진 선택됨`;
                btnUpload.disabled = false;
            }
        });

        // 4. 업로드 및 서버 지연 시 자동 재시도 로직
        btnUpload.addEventListener('click', async () => {
            btnUpload.disabled = true;
            const files = fileInput.files;
            let success = 0;
            
            for (let i = 0; i < files.length; i++) {
                if (files[i].size > 20 * 1024 * 1024) continue; // 20MB 이상 패스
                
                showMsg(`사진 보내는 중... (${i+1}/${files.length})`, 'text-info');
                try {
                    const base64 = await toBase64(files[i]);
                    await upload(files[i].name, files[i].type, base64, 0);
                    success++;
                } catch(e) {}
            }
            
            showMsg(`감사합니다! 총 ${success}장의 사진이 도착했습니다.`, 'text-success');
            document.getElementById('btn-file-text').innerText = '📸 다른 사진 더 보내기';
            btnUpload.disabled = false;
        });

        async function upload(name, type, data, attempt) {
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({filename: name, mimeType: type, data: data}),
                    headers: {'Content-Type': 'text/plain;charset=utf-8'}
                });
                const json = await res.json();
                if (json.status !== 'ok') throw new Error();
            } catch (err) {
                if (attempt < 3) {
                    await new Promise(r => setTimeout(r, Math.pow(2, attempt) * 1000));
                    return upload(name, type, data, attempt + 1);
                } else throw err;
            }
        }

        function toBase64(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });
        }

        function showMsg(txt, cls) {
            const el = document.getElementById('status-msg');
            el.innerText = txt; el.className = cls;
        }
    </script>
</body>
</html>
